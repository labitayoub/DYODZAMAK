services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dyodzamak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dyodzamak}
      POSTGRES_DB: dyodzamak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dyodzamak"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads/products:/app/public/uploads/products

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "tsx", "prisma/seed.ts"]
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    profiles: ["seed"]

volumes:
  pgdata:
