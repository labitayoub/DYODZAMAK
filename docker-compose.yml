services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dyodzamak
      POSTGRES_PASSWORD: dyodzamak_secret_2026
      POSTGRES_DB: dyodzamak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dyodzamak"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://dyodzamak:dyodzamak_secret_2026@db:5432/dyodzamak"
      JWT_SECRET: "dyodzamak-jwt-secret-ultra-secure-2026"
      NEXTAUTH_URL: "http://localhost:3000"
      ADMIN_EMAIL: "admin@dyodzamak.ma"
      ADMIN_PASSWORD: "admin123"
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npx", "tsx", "prisma/seed.ts"]
    environment:
      DATABASE_URL: "postgresql://dyodzamak:dyodzamak_secret_2026@db:5432/dyodzamak"
      ADMIN_EMAIL: "admin@dyodzamak.ma"
      ADMIN_PASSWORD: "admin123"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["seed"]

volumes:
  pgdata:
